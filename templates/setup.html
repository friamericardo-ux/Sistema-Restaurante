{% extends "base.html" %}

{% block title %}Configuração Inicial — Comanda Digital{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block content %}
<div class="login-container">
  <div class="login-logo">
    <div class="login-icon">⚙️</div>
    <h1>Configuração Inicial</h1>
    <p>Crie o administrador do sistema</p>
  </div>

  {% if erro %}
  <div class="erro-box">⚠️ {{ erro }}</div>
  {% endif %}

  <form method="POST" action="/setup" autocomplete="off">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <div class="form-group">
      <label for="username">Nome de usuário</label>
      <input type="text" id="username" name="username"
             placeholder="Ex: admin" required minlength="3" maxlength="30"
             autocomplete="off">
    </div>
    <div class="form-group">
      <label for="password">Senha</label>
      <input type="password" id="password" name="password"
             placeholder="Mínimo 6 caracteres" required minlength="6"
             autocomplete="new-password">
    </div>
    <div class="form-group">
      <label for="confirmar">Confirmar senha</label>
      <input type="password" id="confirmar" name="confirmar"
             placeholder="Repita a senha" required minlength="6"
             autocomplete="new-password">
    </div>
    <button type="submit" class="btn-login">Criar Administrador</button>
  </form>
</div>
{% endblock %}
