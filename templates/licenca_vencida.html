<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Licença Expirada</title>
    <style>
        body { background: #0f0f0f; color: #fff; display: flex; align-items: center;
               justify-content: center; height: 100vh; font-family: sans-serif; text-align: center; }
        .box { max-width: 400px; padding: 40px; }
        .icon { font-size: 4rem; margin-bottom: 16px; }
        h1 { font-size: 1.8rem; margin-bottom: 12px; color: #ff4444; }
        p { color: #aaa; line-height: 1.6; }
        .contato { margin-top: 24px; background: #1a1a1a; padding: 16px; border-radius: 12px; }
        .contato strong { color: #ff7a2f; }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">⏰</div>
        <h1>Licença Expirada</h1>
        <p>O acesso ao sistema foi suspenso por falta de pagamento.</p>
        <div class="contato">
            <p>Entre em contato com o suporte:<br>
            <strong>Comanda Digital</strong></p>
        </div>
    </div>
</body>
</html>
