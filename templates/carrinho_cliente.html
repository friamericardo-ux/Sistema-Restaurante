{% extends "base.html" %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/carrinho.css') }}">
{% endblock %}
{% block content %}
<div class="cart-header">
  <div class="logo">🍔 Comanda<span>Digital</span></div>
  <button class="btn-voltar" onclick="window.location.href='/cardapio'">← Voltar ao Cardápio</button>
</div>
<div class="main" style="max-width:480px; margin:0 auto; padding:24px;">
  <div class="cart-box" id="cart-box">
    <div id="cart-items" class="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-linha">
        <span>Subtotal</span>
        <span id="cart-subtotal">R$ 0,00</span>
      </div>
      <div class="cart-linha">
        <span>Entrega</span>
        <span id="cart-entrega">Calculando...</span>
      </div>
      <div class="cart-total-linha">
        <span>Total</span>
        <span id="cart-total">R$ 0,00</span>
      </div>
    </div>
  </div>
  <div class="form-box show" id="form-box">
    <div class="form-title">Dados para entrega</div>
    <div class="form-group">
      <label for="nome">Nome</label>
      <input type="text" id="nome" name="nome" required>
    </div>
    <div class="form-group">
      <label for="telefone">Telefone</label>
      <input type="text" id="telefone" name="telefone" required>
      <div id="msg-autopreenchido" style="display:none; font-size:12px; color:#4caf50; margin-top:4px;">Dados preenchidos automaticamente ✓</div>
    </div>
    <div class="form-group">
      <label for="endereco">Endereço</label>
      <input type="text" id="endereco" name="endereco"
             placeholder="Rua, número, bairro, cidade"
             autocomplete="off" required>
      <div id="endereco-sugestoes" style="display:none;"></div>
    </div>
    <div class="form-group">
      <label for="observacao">Observação</label>
      <input type="text" id="observacao" name="observacao">
    </div>
    <div class="pagamento-opcoes">
      <label class="pagamento-card">
        <input type="radio" name="pagamento" value="cartao" id="pag-cartao">
        <span class="pagamento-icon">💳</span>
        <span class="pagamento-texto">Cartão</span>
        <span class="pagamento-check"></span>
      </label>
      <label class="pagamento-card">
        <input type="radio" name="pagamento" value="dinheiro" id="pag-dinheiro">
        <span class="pagamento-icon">💵</span>
        <span class="pagamento-texto">Dinheiro</span>
        <span class="pagamento-check"></span>
      </label>
<div class="troco-section" id="troco-section" style="display:none;">
  <label class="troco-opcao">
  <input type="radio" name="troco-opcao" id="troco-nao" value="nao" checked onchange="onTrocoChange()">
  Não precisa de troco
  </label>
  <label class="troco-opcao">
  <input type="radio" name="troco-opcao" id="troco-sim" value="sim" onchange="onTrocoChange()">
    Precisa de troco
  </label>
  <div id="troco-valor-section" style="display:none;">
  <div class="troco-input-wrap">
  <span class="troco-prefix">R$</span>
  <input type="text" id="troco" name="troco">
  </div>
</div>
      </div>
      </div><!-- fecha troco-section -->
      <button class="btn-finalizar" id="btn-finalizar" onclick="finalizarPedido()">✅ Finalizar Pedido</button>
      <script>
const inputEndereco = document.getElementById('endereco');
const sugestoesDiv = document.getElementById('endereco-sugestoes');
let autocompleteService, sessionToken;

function initAutocomplete() {
  autocompleteService = new google.maps.places.AutocompleteService();
  sessionToken = new google.maps.places.AutocompleteSessionToken();

  inputEndereco.addEventListener('input', function() {
    const valor = this.value;
    if (valor.length < 3) {
      sugestoesDiv.style.display = 'none';
      return;
    }
    autocompleteService.getPlacePredictions(
      { input: valor, sessionToken,
        componentRestrictions: { country: 'br' } },
      function(predictions, status) {
        if (status !== google.maps.places.PlacesServiceStatus.OK || !predictions) {
          sugestoesDiv.style.display = 'none';
          return;
        }
        sugestoesDiv.innerHTML = '';
        predictions.forEach(function(p) {
          const item = document.createElement('div');
          item.className = 'endereco-sugestao-item';
          item.textContent = p.description;
          item.addEventListener('click', function() {
            inputEndereco.value = p.description;
            sugestoesDiv.style.display = 'none';
            calcularFrete(p.description);
          });
          sugestoesDiv.appendChild(item);
        });
        sugestoesDiv.style.display = 'block';
      }
    );
  });

  document.addEventListener('click', function(e) {
    if (e.target !== inputEndereco) sugestoesDiv.style.display = 'none';
  });
}

function calcularFrete(enderecoCliente) {
  fetch('/api/maps/calcular-frete', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({endereco_destino: enderecoCliente})
  })
  .then(r => r.json())
  .then(data => {
    if (data.sucesso) {
      document.getElementById('cart-entrega').textContent =
        'R$ ' + data.frete.toFixed(2).replace('.', ',');
      window._freteCalculado = data.frete;
      atualizarTotal();
    }
  });
}
      </script>
      </div><!-- fecha form-box -->
      <div class="sucesso-box" id="sucesso-box" style="display:none;">
        <div class="sucesso-icon">🎉</div>
        <div class="sucesso-titulo">Pedido Criado!</div>
        <div class="sucesso-sub">Seu pedido foi enviado com sucesso.</div>
        <button class="btn-whatsapp" id="btn-whatsapp">WhatsApp</button>
        <button class="btn-novo" id="btn-novo">Novo Pedido</button>
      </div>
    </div>
    <div class="toast" id="toast"></div>
    <script src="/static/js/carrinho.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_key }}&libraries=places&callback=initAutocomplete" async defer></script>
    {% endblock %}
