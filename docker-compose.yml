version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - SUPERADMIN_PIN=${SUPERADMIN_PIN}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    volumes:
      - uploads_data:/app/static/uploads
    restart: unless-stopped

volumes:
  uploads_data:
